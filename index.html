<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just Something For You ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Entry */
#entry {
    position: fixed;
    width:100%; height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction:column;
}

/* Container */
.container {
    text-align: center;
    background: rgba(255,255,255,0.12);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
    animation: zoomIn 1.2s ease;
}

.reveal { display:none; }

.signature {
    font-size: 1.8rem;
    margin-top: 20px;
    font-family: cursive;
    opacity: 0;
    animation: fadeIn 2s forwards;
}

.typing {
    font-size: 1rem;
    margin: 20px 0;
    min-height: 70px;
    line-height: 1.5;
}

button {
    padding: 12px 20px;
    margin: 8px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
}

.yes { background:#ff2e63; color:white; }
.yes2 { background:white; color:#ff2e63; }

@keyframes fadeIn { to { opacity:1; } }
@keyframes zoomIn {
    from { transform: scale(0.8); opacity:0; }
    to { transform: scale(1); opacity:1; }
}

/* Hearts */
.heart {
    position:absolute;
    bottom:-20px;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    to { transform: translateY(-900px); opacity:0; }
}
</style>

</head>

<body>

<div id="entry">
    <h2>Tap to open 💌</h2>
</div>

<div class="container" id="main">
    <h1>Hey… ❤️</h1>
    <div class="typing" id="text"></div>
    <p>Would you like to go out with me? 💖</p>

    <button class="yes" onclick="startMagic()">Yes 💕</button>
    <button class="yes2" onclick="startMagic()">Obviously Yes 😄</button>
</div>

<div class="container reveal" id="reveal">
    <h1 id="afterText"></h1>
    <div class="signature">— Aryan Chaudhary 💖</div>
</div>

<!-- Better Emotional Piano -->
<audio id="music" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2023/03/14/audio_5c5b5c2c3e.mp3?filename=sad-romantic-piano-140997.mp3" type="audio/mpeg">
</audio>

<script>

// Entry
document.getElementById("entry").onclick = function(){
    this.style.display="none";
};

// First typing
const msg = "I don’t know when it started… but somehow, you became someone I genuinely look forward to. Talking to you feels easy… being around you feels right 💫";
let i=0;

function typeEffect(){
    if(i<msg.length){
        text.innerHTML+=msg.charAt(i);
        i++;
        setTimeout(typeEffect,40);
    }
}
typeEffect();

// Main flow
function startMagic(){

    document.getElementById("main").style.display="none";
    document.getElementById("reveal").style.display="block";

    let music=document.getElementById("music");
    music.volume=0;
    music.play();

    // smooth fade in
    let vol=0;
    let fade=setInterval(()=>{
        if(vol<0.35){
            vol+=0.01;
            music.volume=vol;
        } else clearInterval(fade);
    },300);

    // Delay for emotional pause
    setTimeout(()=>{

        let text="I don’t know where this will go… but I know I want to explore it with you ❤️";
        let j=0;

        function type2(){
            if(j<text.length){
                afterText.innerHTML+=text.charAt(j);
                j++;
                setTimeout(type2,60);
            }
        }
        type2();

    },1500);

    // final line (slow)
    setTimeout(()=>{
        afterText.innerHTML+="<br><br>Take your time… I’ll be right here 💫";
    },5000);

    // WhatsApp
    setTimeout(()=>{
        window.open("https://wa.me/918445625075?text=She said YES ❤️","_blank");
    },7000);

    // Redirect (SLOW NOW)
    setTimeout(()=>{
        window.location.href="PASTE_YOUR_GOOGLE_FORM_LINK_HERE";
    },10000);
}

// Hearts
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);

</script>

</body>
</html>
