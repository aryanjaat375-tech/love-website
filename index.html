<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just Something For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

#entry {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.12);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    backdrop-filter: blur(12px);
}

.reveal { display: none; }

.signature {
    font-size: 1.6rem;
    margin-top: 20px;
    font-family: cursive;
    opacity: 0;
    animation: fadeIn 2s forwards;
}

.typing {
    min-height: 70px;
    line-height: 1.5;
}

button {
    padding: 12px 20px;
    margin: 8px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
}

.yes { background:#ff2e63; color:white; }
.yes2 { background:white; color:#ff2e63; }

@keyframes fadeIn { to { opacity:1; } }

.heart {
    position: absolute;
    bottom: -20px;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    to { transform: translateY(-900px); opacity:0; }
}
</style>
</head>

<body>

<div id="entry">
    <h2>Tap to open 💌</h2>
</div>

<div class="container" id="main">
    <h1>Hey… ❤️</h1>
    <div class="typing" id="text"></div>
    <p>Would you like to go out with me? 💖</p>

    <button class="yes" onclick="startMagic()">Yes 💕</button>
    <button class="yes2" onclick="startMagic()">Obviously Yes 😄</button>
</div>

<div class="container reveal" id="reveal">
    <h1 id="afterText"></h1>
    <div class="signature">— Aryan Chaudhary 💖</div>
</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2023/03/14/audio_5c5b5c2c3e.mp3" type="audio/mpeg">
</audio>

<script>

let music = document.getElementById("music");

// 🔥 START MUSIC ON FIRST TAP (THIS FIXES EVERYTHING)
document.getElementById("entry").onclick = function(){
    this.style.display="none";

    music.volume = 0;
    music.play().then(()=>{
        let vol = 0;
        let fade = setInterval(()=>{
            if(vol < 0.4){
                vol += 0.02;
                music.volume = vol;
            } else clearInterval(fade);
        }, 300);
    });
};

// typing
const msg = "I don’t know when it started… but somehow, you became someone I genuinely look forward to. Talking to you feels easy… being around you feels right 💫";
let i=0;

function typeEffect(){
    if(i<msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typeEffect,50);
    }
}
typeEffect();

function startMagic(){

    document.getElementById("main").style.display="none";
    document.getElementById("reveal").style.display="block";

    let afterText = document.getElementById("afterText");
    afterText.innerHTML="";

    setTimeout(()=>{
        let textMsg="I don’t know where this will go… but I know I want to explore it with you ❤️";
        let j=0;

        function type2(){
            if(j<textMsg.length){
                afterText.innerHTML+=textMsg.charAt(j);
                j++;
                setTimeout(type2,80);
            }
        }
        type2();
    },3000);

    setTimeout(()=>{
        afterText.innerHTML+="<br><br>Take your time… I’ll be right here 💫";
    },10000);

    // safer WhatsApp open (not blocked)
    setTimeout(()=>{
        window.location.href="https://wa.me/918445625075?text=She said YES ❤️";
    },15000);
}

// hearts
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);

</script>

</body>
</html>
