<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just Something For You ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.12);
    padding: 50px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
}

.reveal {
    display: none;
}

.signature {
    font-size: 2rem;
    font-family: cursive;
    margin-top: 20px;
    opacity: 0;
    animation: fadeIn 2s forwards;
}

.typing {
    font-size: 1.2rem;
    margin: 20px 0;
    min-height: 60px;
}

button {
    padding: 15px 30px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

.yes {
    background: #ff2e63;
    color: white;
}

.yes2 {
    background: white;
    color: #ff2e63;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

.heart {
    position: absolute;
    bottom: -20px;
    font-size: 18px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-900px); opacity: 0; }
}
</style>

</head>

<body>

<div class="container" id="main">
    <h1>Hey… ❤️</h1>
    <div class="typing" id="text"></div>
    <p>Would you like to go out with me? 💖</p>

    <button class="yes" onclick="startMagic()">Yes 💕</button>
    <button class="yes2" onclick="startMagic()">Obviously Yes 😄</button>
</div>

<div class="container reveal" id="reveal">
    <h1 id="afterText"></h1>
    <div class="signature">— Aryan Chaudhary 💖</div>
</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

// First typing
const msg = "I don’t know when it started… but you became someone special. Talking to you feels easy… and maybe this could be something beautiful 💫";
let i = 0;

function typeEffect() {
    if (i < msg.length) {
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typeEffect, 35);
    }
}
typeEffect();

// Main action
function startMagic() {
    document.getElementById("main").style.display = "none";
    document.getElementById("reveal").style.display = "block";

    document.getElementById("music").play();

    let text = "I was really hoping you'd say that… ❤️";
    let j = 0;

    function type2() {
        if (j < text.length) {
            document.getElementById("afterText").innerHTML += text.charAt(j);
            j++;
            setTimeout(type2, 40);
        }
    }
    type2();

    // WhatsApp alert
    setTimeout(() => {
        window.open("https://wa.me/918445625075?text=She said YES ❤️", "_blank");
    }, 2000);

    // Redirect to Google Form
    setTimeout(() => {
        window.location.href = "PASTE_YOUR_GOOGLE_FORM_LINK_HERE";
    }, 5000);
}

// Hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 250);

</script>

</body>
</html>
