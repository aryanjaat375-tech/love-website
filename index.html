<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
    }

    .container {
        background: rgba(255, 255, 255, 0.15);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.2rem;
        margin-bottom: 30px;
    }

    button {
        padding: 15px 25px;
        margin: 10px;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .yes {
        background: #ff4b5c;
        color: white;
    }

    .yes:hover {
        background: #ff1e3c;
        transform: scale(1.1);
    }

    .yes2 {
        background: #ffffff;
        color: #ff4b5c;
    }

    .yes2:hover {
        transform: scale(1.1);
    }

    .heart {
        font-size: 40px;
        animation: beat 1s infinite;
    }

    @keyframes beat {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
</style>
</head>

<body>

<div class="container">
    <div class="heart">❤️</div>
    <h1>Hey Beautiful...</h1>
    <p>
        I’ve been wanting to ask you something for a while now…<br><br>
        Would you like to go out with me? 💖
    </p>

    <button class="yes" onclick="submitForm()">Yes</button>
    <button class="yes2" onclick="submitForm()">Obviously Yes 😄</button>
</div>

<script>
function submitForm() {
    window.location.href = "PASTE_YOUR_GOOGLE_FORM_LINK_HERE";
}
</script>

</body>
</html>
